<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabQMS Pro - Cihaz Kütüphanesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1E40AF; --border: #e2e8f0; --bg: #f8fafc; --success: #10B981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #334155; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: #fff; padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: 1 / -1; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; outline: none; font-family: inherit; }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1); }
        .btn { background: var(--primary); color: #fff; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.2s; }
        .btn:hover { background: #1e3a8a; transform: translateY(-1px); }
        
        /* Arama ve Tablo Stilleri */
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; }
        .search-box { width: 250px; position: relative; }
        .search-box input { padding-left: 35px; background: #fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%2364748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>') no-repeat 10px center; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th { background: #f1f5f9; padding: 12px; text-align: left; color: #64748b; font-weight: 600; border-bottom: 2px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        .price { color: var(--success); font-weight: bold; }
        .badge { background: #e0e7ff; color: #4338ca; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        
        /* Başarılı Mesajı Animasyonu */
        #success-msg { display: none; background: #dcfce7; color: #166534; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: 600; border: 1px solid #bbf7d0; }
    </style>
</head>
<body>
    <div class="container">
        <div id="success-msg">✅ Cihaz kütüphaneye başarıyla eklendi!</div>

        <div class="card">
            <h2 style="margin-top:0; color: var(--primary);">🗂️ Yeni Cihaz Tipi Ekle</h2>
            <form id="cihazForm" onsubmit="cihazKaydet(event)">
                <div class="form-grid">
                    <div class="full">
                        <label>Cihaz Adı / Tanımı</label>
                        <input type="text" id="cihaz_adi" placeholder="Örn: Dış Çap Mikrometresi" required>
                    </div>
                    <div>
                        <label>Kategori (Kategori Modülünden Çekilir)</label>
                        <select id="kategoriSelect" required>
                            <option value="">Yükleniyor...</option>
                        </select>
                    </div>
                    <div>
                        <label>Kalibrasyon Periyodu</label>
                        <select id="periyot">
                            <option value="12 Ay">12 Ay</option>
                            <option value="24 Ay">24 Ay</option>
                            <option value="6 Ay">6 Ay</option>
                            <option value="Periyotsuz">Periyotsuz</option>
                        </select>
                    </div>
                    <div class="full" style="background: #f0fdf4; padding: 15px; border-radius: 8px; border: 1px solid #dcfce7;">
                        <label style="color: #166534;">Liste Fiyatı (Birim Fiyat)</label>
                        <div style="display: flex; gap:10px;">
                            <input type="number" id="fiyat" placeholder="Örn: 850" step="0.01" required>
                            <select id="para_birimi" style="width:120px;">
                                <option value="₺ TL">₺ TL</option>
                                <option value="$ USD">$ USD</option>
                                <option value="€ EUR">€ EUR</option>
                            </select>
                        </div>
                    </div>
                    <div class="full">
                        <button type="submit" id="submitBtn" class="btn">🚀 Kütüphaneye Ekle</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="card">
            <div class="table-header">
                <h2 style="margin:0; color: var(--primary);">📚 Kayıtlı Cihazlar</h2>
                <div class="search-box">
                    <input type="text" id="cihazAra" onkeyup="tabloAra()" placeholder="Cihaz veya kategori ara...">
                </div>
            </div>
            
            <table id="kutuphaneTablo">
                <thead>
                    <tr>
                        <th>Cihaz Tipi</th>
                        <th>Kategori</th>
                        <th>Periyot</th>
                        <th>Fiyat</th>
                    </tr>
                </thead>
                <tbody id="cihazListe">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // 1. KATEGORİLERİ ÇEK
        async function kategorileriGetir() {
            try {
                const res = await fetch('/api/kategoriler');
                const kategoriler = await res.json();
                const select = document.getElementById("kategoriSelect");
                select.innerHTML = '<option value="">-- Kategori Seçin --</option>';
                kategoriler.forEach(k => {
                    const opt = document.createElement("option");
                    opt.value = k.id;
                    opt.innerText = k.kategori_adi;
                    select.appendChild(opt);
                });
            } catch (err) { console.error("Kategori hatası:", err); }
        }

        // 2. LİSTEYİ YÜKLE
        async function kütüphaneYukle() {
            try {
                const res = await fetch('/api/cihaz-kutuphanesi');
                const cihazlar = await res.json();
                const tbody = document.getElementById("cihazListe");
                tbody.innerHTML = "";
                
                if (cihazlar.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Kütüphane boş.</td></tr>';
                    return;
                }

                cihazlar.forEach(c => {
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${c.cihaz_adi}</strong></td>
                            <td><span class="badge">${c.kategori_adi}</span></td>
                            <td>${c.periyot}</td>
                            <td class="price">${c.fiyat} ${c.para_birimi}</td>
                        </tr>`;
                });
            } catch (err) { console.error("Liste hatası:", err); }
        }

        // 3. KAYDETME VE MESAJ GÖSTERME
        async function cihazKaydet(e) {
            e.preventDefault();
            const btn = document.getElementById("submitBtn");
            const successMsg = document.getElementById("success-msg");
            
            btn.disabled = true;
            btn.innerText = "Kaydediliyor...";

            const payload = {
                kategori_id: document.getElementById("kategoriSelect").value,
                cihaz_adi: document.getElementById("cihaz_adi").value,
                periyot: document.getElementById("periyot").value,
                fiyat: document.getElementById("fiyat").value,
                para_birimi: document.getElementById("para_birimi").value
            };

            try {
                const res = await fetch('/api/cihaz-kutuphanesi', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    // Formu sıfırla ve mesajı göster
                    document.getElementById("cihazForm").reset();
                    successMsg.style.display = "block";
                    setTimeout(() => { successMsg.style.display = "none"; }, 3000);
                    
                    await kütüphaneYukle();
                } else { alert("Kayıt sırasında bir hata oluştu."); }
            } catch (err) { console.error("Bağlantı hatası:", err); } 
            finally {
                btn.disabled = false;
                btn.innerText = "🚀 Kütüphaneye Ekle";
            }
        }

        // 4. ANLIK ARAMA (TABLO FİLTRELEME)
        function tabloAra() {
            const filter = document.getElementById("cihazAra").value.toUpperCase();
            const rows = document.getElementById("cihazListe").getElementsByTagName("tr");

            for (let i = 0; i < rows.length; i++) {
                const txtAdi = rows[i].cells[0].textContent || rows[i].cells[0].innerText;
                const txtKat = rows[i].cells[1].textContent || rows[i].cells[1].innerText;
                
                if (txtAdi.toUpperCase().indexOf(filter) > -1 || txtKat.toUpperCase().indexOf(filter) > -1) {
                    rows[i].style.display = "";
                } else {
                    rows[i].style.display = "none";
                }
            }
        }

        window.onload = () => {
            kategorileriGetir();
            kütüphaneYukle();
        };
    </script>
</body>
</html>
