<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Cihaz Tipleri</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #334155; padding: 20px; }
        .card { background: #fff; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: 1 / -1; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .btn { background: #1E40AF; color: #fff; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th { background: #f1f5f9; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .price { color: #10B981; font-weight: bold; }
    </style>
</head>
<body>
    <div style="max-width: 900px; margin: 0 auto;">
        <div style="margin-bottom: 15px;"><a href="index.html" style="text-decoration:none; color:#1E40AF; font-weight:bold;">⬅️ Ana Panele Dön</a></div>
        <div class="card">
            <h2>🗂️ Yeni Cihaz Tipi Ekle</h2>
            <div class="form-grid">
                <div class="full"><label>Cihaz Adı</label><input type="text" placeholder="Örn: Dış Çap Mikrometresi"></div>
                <div><label>Kategori</label><select><option>Boyutsal</option><option>Sıcaklık</option></select></div>
                <div><label>Periyot</label><select><option>12 Ay</option><option>24 Ay</option></select></div>
                <div class="full" style="background: #f0fdf4; padding: 15px; border-radius: 8px;">
                    <label style="color: #166534;">Liste Fiyatı</label>
                    <div style="display: flex; gap:10px;"><input type="number" placeholder="Örn: 850"><select style="width:100px;"><option>₺ TL</option></select></div>
                </div>
                <div class="full"><button class="btn">+ Kütüphaneye Ekle</button></div>
            </div>
        </div>
        <div class="card">
            <h2>📚 Kayıtlı Tipler</h2>
            <table>
                <tr><th>Cihaz Tipi</th><th>Kategori</th><th>Periyot</th><th>Fiyat</th></tr>
                <tr><td>Dış Çap Mikrometresi</td><td>Boyutsal</td><td>12 Ay</td><td class="price">850.00 ₺</td></tr>
                <tr><td>Etüv / Fırın</td><td>Sıcaklık</td><td>12 Ay</td><td class="price">3,200.00 ₺</td></tr>
            </table>
        </div>
    </div>
</body>
</html>
