<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Personel ve Yetkiler</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #334155; padding: 20px; }
        .card { background: #fff; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 5px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .btn { background: #1E40AF; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 15px;}
        .role-box { background: #eff6ff; padding: 15px; border-radius: 8px; border: 1px dashed #60A5FA; }
    </style>
</head>
<body>
    <div style="max-width: 900px; margin: 0 auto;">
        <div style="margin-bottom: 15px;"><a href="index.html" style="text-decoration:none; color:#1E40AF; font-weight:bold;">⬅️ Ana Panele Dön</a></div>
        
        <div class="card">
            <h2>👤 Yeni Personel Ekle</h2>
            <div class="grid">
                <div><label>Adı Soyadı</label><input type="text" placeholder="Örn: Ahmet Yılmaz"></div>
                <div><label>Sisteme Giriş Şifresi</label><input type="password" placeholder="***"></div>
            </div>
            
            <h3 style="margin-top: 20px; color: #1E40AF;">Sertifika İşlem Rolleri</h3>
            <div class="role-box">
                <label style="display:flex; gap:10px; color:#1e40af; cursor:pointer;"><input type="checkbox" checked> Ölçüm Yapan Personel (Veri Girebilir)</label>
                <label style="display:flex; gap:10px; color:#9d174d; cursor:pointer; margin-top:10px;"><input type="checkbox" id="onay" onchange="document.getElementById('varsayilan').style.display = this.checked ? 'block' : 'none'"> Onaylayan Personel (Sertifika İmzalayabilir)</label>
                
                <div id="varsayilan" style="display:none; margin-left: 25px; margin-top: 10px; padding: 10px; background: #fff; border-radius: 6px;">
                    <label style="display:flex; gap:10px; color:#166534; cursor:pointer;"><input type="checkbox"> Bu kişiyi sistemde "Varsayılan Onaylayıcı" yap.</label>
                </div>
            </div>

            <h3 style="margin-top: 20px; color: #1E40AF;">Sistem Erişimleri (Modüller)</h3>
            <div class="grid">
                <label style="display:flex; gap:10px;"><input type="checkbox" checked> Cihaz Kabul Ekranı</label>
                <label style="display:flex; gap:10px;"><input type="checkbox" checked> Teklif Modülü</label>
                <label style="display:flex; gap:10px;"><input type="checkbox"> Sistem Ayarları (Admin)</label>
            </div>

            <button class="btn" onclick="alert('Personel kaydedildi!')">💾 Kaydet</button>
        </div>
    </div>
</body>
</html>
