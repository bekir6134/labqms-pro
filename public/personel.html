<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Personel Yönetimi - LabQMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#1E40AF; --sidebar:#1e293b; --border:#e2e8f0; --bg:#f8fafc; --success:#10B981; --danger:#ef4444; }
        body { font-family:'Inter',sans-serif; background:var(--bg); margin:0; display:flex; color:#334155; }
        
        .sidebar { width:250px; background:var(--sidebar); color:white; height:100vh; position:fixed; padding:20px; box-sizing:border-box; }
        .nav-link { display:block; color:#cbd5e1; text-decoration:none; padding:12px; border-radius:8px; margin-bottom:5px; transition:0.3s; font-size:0.9rem; }
        .nav-link:hover, .nav-link.active { background:#334155; color:white; }

        .main-content { margin-left:250px; flex:1; padding:30px; }
        
        .card { background:#fff; padding:25px; border-radius:12px; border:1px solid var(--border); margin-bottom:20px; box-shadow:0 4px 6px rgba(0,0,0,0.05); }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
        
        h2 { margin-top:0; color:var(--primary); font-size: 1.4rem; margin-bottom: 20px;}
        h3 { font-size:1.1rem; color:var(--primary); margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:10px; }
        
        label { display:block; font-size:0.85rem; font-weight:600; color:#64748b; margin-bottom:5px; }
        input[type="text"], input[type="password"] { width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; box-sizing:border-box; outline:none; transition:0.2s; }
        input[type="text"]:focus, input[type="password"]:focus { border-color:var(--primary); }
        
        .role-box { background:#f8fafc; padding:15px; border-radius:8px; border:1px solid var(--border); }
        .check-label { display:flex; gap:10px; align-items:center; cursor:pointer; font-weight:500; margin-bottom:10px; color:#334155; }
        
        .btn { background:var(--primary); color:white; padding:12px 20px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; width:100%; margin-top:20px; transition:0.2s;}
        .btn:hover { background:#1e3a8a; }

        table { width:100%; border-collapse:collapse; margin-top:10px; }
        th { background:#f8fafc; text-align:left; padding:12px; border-bottom:2px solid var(--border); color:#64748b; font-size:0.85rem; }
        td { padding:12px; border-bottom:1px solid var(--border); font-size:0.9rem; vertical-align:middle; }
        .btn-del { background:#fee2e2; color:var(--danger); border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:0.8rem; font-weight:600; }
        
        .badge-role { display:inline-block; padding:3px 8px; background:#e0e7ff; color:#4338ca; border-radius:12px; font-size:0.75rem; font-weight:600; margin:2px; }
        .badge-star { background:#fef9c3; color:#854d0e; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color: white; text-align: center; margin-bottom: 30px;">LabQMS Pro</h2>
        <nav>
            <a href="dashboard.html" class="nav-link">🏠 Dashboard</a>
            <a href="kabul.html" class="nav-link">📥 Cihaz Kabul</a>
            <a href="operasyon.html" class="nav-link">🔬 Operasyon</a>
            <a href="metotlar.html" class="nav-link">🧪 Metotlar</a>
            <a href="personel.html" class="nav-link active">👨‍🔬 Personel</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="card">
            <h2>➕ Yeni Personel Ekle (Sistem Kullanıcısı)</h2>
            <form id="personelForm">
                <div class="grid">
                    <div>
                        <h3>Kimlik ve Giriş Bilgileri</h3>
                        <div style="margin-bottom:15px;">
                            <label>Ad Soyad</label>
                            <input type="text" id="ad_soyad" placeholder="Örn: Ahmet Yılmaz" required>
                        </div>
                        <div style="margin-bottom:15px;">
                            <label>Kullanıcı Adı (Giriş İçin)</label>
                            <input type="text" id="kullanici_adi" placeholder="Örn: ahmetyilmaz" required>
                        </div>
                        <div style="margin-bottom:15px;">
                            <label>Şifre</label>
                            <input type="password" id="sifre" placeholder="Sisteme giriş şifresi" required>
                        </div>
                    </div>

                    <div>
                        <h3>Sertifika & İşlem Rolleri</h3>
                        <div class="role-box">
                            <label class="check-label" style="color:var(--primary);">
                                <input type="checkbox" id="rol_olcum" value="olcum" checked> Ölçüm Yapan Personel (Operatör)
                            </label>
                            <label class="check-label" style="color:#9d174d;">
                                <input type="checkbox" id="rol_onay" value="onay" onchange="document.getElementById('varsayilan_kutu').style.display = this.checked ? 'block' : 'none'"> 
                                Onaylayan Personel (İmzacı)
                            </label>
                            
                            <div id="varsayilan_kutu" style="display:none; margin-left: 25px; margin-top: 5px; padding: 10px; background: #fff; border-radius: 6px; border:1px solid #fef08a;">
                                <label class="check-label" style="color:#854d0e; margin:0;">
                                    <input type="checkbox" id="varsayilan_onaylayici"> 🌟 Sertifikalarda Varsayılan Onaylayıcı Yap
                                </label>
                            </div>
                        </div>

                        <h3 style="margin-top:20px;">Menü Erişim Yetkileri</h3>
                        <div class="role-box" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                            <label class="check-label"><input type="checkbox" class="erisim" value="kabul" checked> Cihaz Kabul</label>
                            <label class="check-label"><input type="checkbox" class="erisim" value="operasyon" checked> Operasyon</label>
                            <label class="check-label"><input type="checkbox" class="erisim" value="teklif"> Teklif Modülü</label>
                            <label class="check-label"><input type="checkbox" class="erisim" value="ayarlar"> Ayarlar & Tanımlar</label>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn">💾 Personeli Sisteme Kaydet</button>
            </form>
        </div>

        <div class="card">
            <h2>👥 Kayıtlı Personeller ve Kullanıcılar</h2>
            <table>
                <thead>
                    <tr>
                        <th>Ad Soyad</th>
                        <th>Kullanıcı Adı</th>
                        <th>Sertifika Rolleri</th>
                        <th>İşlem</th>
                    </tr>
                </thead>
                <tbody id="personelListesi">
                    <tr><td colspan="4" style="text-align:center;">Yükleniyor...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function personelleriGetir() {
            try {
                const res = await fetch('/api/personeller');
                const liste = await res.json();
                const tbody = document.getElementById("personelListesi");
                tbody.innerHTML = "";

                if(liste.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#94a3b8;">Henüz kayıtlı personel yok.</td></tr>`;
                    return;
                }

                liste.forEach(p => {
                    let rollerHtml = "";
                    const roller = p.roller || [];
                    if(roller.includes("olcum")) rollerHtml += `<span class="badge-role">🔬 Ölçümcü</span>`;
                    if(roller.includes("onay")) rollerHtml += `<span class="badge-role" style="background:#fce7f3; color:#9d174d;">✍️ Onaylayıcı</span>`;
                    if(p.varsayilan_onaylayici) rollerHtml += `<span class="badge-role badge-star">🌟 Varsayılan İmza</span>`;

                    tbody.innerHTML += `
                        <tr>
                            <td><b>${p.ad_soyad}</b></td>
                            <td><span style="background:#f1f5f9; padding:4px 8px; border-radius:6px; font-family:monospace;">${p.kullanici_adi}</span></td>
                            <td>${rollerHtml || '-'}</td>
                            <td><button class="btn-del" onclick="personelSil(${p.id})">Sil</button></td>
                        </tr>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        document.getElementById("personelForm").onsubmit = async (e) => {
            e.preventDefault();

            const roller = [];
            if(document.getElementById("rol_olcum").checked) roller.push("olcum");
            if(document.getElementById("rol_onay").checked) roller.push("onay");

            const erisimler = Array.from(document.querySelectorAll('.erisim:checked')).map(cb => cb.value);

            const payload = {
                ad_soyad: document.getElementById("ad_soyad").value,
                kullanici_adi: document.getElementById("kullanici_adi").value,
                sifre: document.getElementById("sifre").value,
                roller: roller,
                erisimler: erisimler,
                varsayilan_onaylayici: document.getElementById("varsayilan_onaylayici").checked
            };

            try {
                const res = await fetch('/api/personeller', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                
                if(res.ok) {
                    alert("Personel başarıyla eklendi!");
                    document.getElementById("personelForm").reset();
                    document.getElementById('varsayilan_kutu').style.display = 'none';
                    personelleriGetir();
                } else {
                    const errorData = await res.json();
                    alert(errorData.error || "Kayıt sırasında hata oluştu!");
                }
            } catch (err) { console.error(err); }
        };

        async function personelSil(id) {
            if(!confirm("Bu personeli (ve sisteme giriş yetkisini) silmek istediğinize emin misiniz?")) return;
            try {
                const res = await fetch(`/api/personeller/${id}`, { method: 'DELETE' });
                if(res.ok) personelleriGetir();
            } catch(e) { console.error(e); }
        }

        window.onload = personelleriGetir;
    </script>
</body>
</html>
