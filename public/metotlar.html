<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kalibrasyon Metotları - LabQMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1E40AF; --sidebar: #1e293b; --border: #e2e8f0; --bg: #f8fafc; --success: #10B981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; color: #334155; }
        
        .main-content { flex: 1; padding: 30px; }
        .card { background: #fff; padding: 25px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        h2 { margin-top: 0; color: var(--primary); font-size: 1.3rem; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .main-content label { display: block; font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 8px; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; box-sizing: border-box; }

        /* Arama ve Seçim Kutusu */
        .selection-box { border: 1px solid var(--border); border-radius: 10px; background: #fff; overflow: hidden; display: flex; flex-direction: column; height: 250px; }
        .search-wrapper { padding: 10px; background: #f8fafc; border-bottom: 1px solid var(--border); }
        .search-wrapper input { border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; width: 100%; font-size: 0.85rem; outline: none; box-sizing: border-box;}
        .list-wrapper { overflow-y: auto; flex: 1; padding: 10px; }
        .list-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 6px; transition: 0.2s; cursor: pointer; font-size: 0.85rem; }
        .list-item:hover { background: #f1f5f9; }
        .list-item input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }

        .btn { padding: 12px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; width: 100%; margin-top: 20px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; text-align: left; padding: 12px; border-bottom: 2px solid var(--border); color: #64748b; font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .badge { padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; background: #e0e7ff; color: #4338ca; margin: 2px; display: inline-block; border: 1px solid #c7d2fe; }
        #success-msg { display:none; background:#dcfce7; color:#166534; padding:15px; border-radius:8px; margin-bottom:15px; text-align:center; font-weight:600; }
    </style>
</head>
<body>


    <div class="main-content">
        <div id="success-msg">✅ Metot başarıyla kaydedildi!</div>

        <div class="card">
            <h2>🧪 Yeni Metot Tanımla</h2>
            <form id="metotForm">
                <div class="form-grid">
                    <div><label>Metot Adı</label><input type="text" id="metot_adi" required></div>
                    <div><label>Metot Kodu</label><input type="text" id="metot_kodu" required></div>
                </div>

                <div class="form-grid" style="margin-top: 25px;">
                    <div>
                        <label>Bağlı Talimatlar</label>
                        <div class="selection-box">
                            <div class="search-wrapper">
                                <input type="text" placeholder="Talimat ara..." onkeyup="filtrele(this, 'talimatList')">
                            </div>
                            <div class="list-wrapper" id="talimatList">
                                </div>
                        </div>
                    </div>

                    <div>
                        <label>Kullanılacak Referans Cihazlar</label>
                        <div class="selection-box">
                            <div class="search-wrapper">
                                <input type="text" placeholder="Referans ara..." onkeyup="filtrele(this, 'referansList')">
                            </div>
                            <div class="list-wrapper" id="referansList">
                                </div>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary">💾 Metodu Sisteme Kaydet</button>
            </form>
        </div>

        <div class="card">
            <h2>📚 Kayıtlı Metotlar</h2>
            <table id="metotTablo">
                <thead>
                    <tr>
                        <th>Kod</th>
                        <th>Metot Adı</th>
                        <th>Bağlı Talimatlar</th>
                        <th>Referanslar (SKT)</th>
                    </tr>
                </thead>
                <tbody id="metotListe"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function baslat() {
            yardimciVerileriYukle();
            // metotlariYukle(); // Liste API'si hazır olduğunda açılabilir
        }

        async function yardimciVerileriYukle() {
            try {
                const res = await fetch('/api/metot-yardimci-veriler');
                const data = await res.json();
                
                // Talimatları Checkbox Listesine Dök
                const tList = document.getElementById("talimatList");
                tList.innerHTML = data.talimatlar.map(t => `
                    <label class="list-item">
                        <input type="checkbox" name="talimatlar" value="${t.id}">
                        <span>${t.talimat_kodu} - ${t.talimat_adi}</span>
                    </label>
                `).join('');

                // Referansları Checkbox Listesine Dök
                const rList = document.getElementById("referansList");
                rList.innerHTML = data.referanslar.map(r => {
                    const skt = r.sonraki_kal_tarihi ? new Date(r.sonraki_kal_tarihi).toLocaleDateString('tr-TR') : 'Yok';
                    return `
                    <label class="list-item">
                        <input type="checkbox" name="referanslar" value="${r.id}">
                        <span>${r.cihaz_adi} (${r.seri_no}) <br> <small style="color:var(--primary)">SKT: ${skt}</small></span>
                    </label>`;
                }).join('');
            } catch (err) { console.error("Yükleme hatası:", err); }
        }

        // Canlı Filtreleme Fonksiyonu
        function filtrele(input, listId) {
            const filter = input.value.toUpperCase();
            const list = document.getElementById(listId);
            const items = list.getElementsByClassName("list-item");

            for (let i = 0; i < items.length; i++) {
                const text = items[i].innerText.toUpperCase();
                items[i].style.display = text.indexOf(filter) > -1 ? "flex" : "none";
            }
        }

        document.getElementById("metotForm").onsubmit = async (e) => {
            e.preventDefault();
            
            // Seçili checkbox'ları topla
            const seciliTalimatlar = Array.from(document.querySelectorAll('input[name="talimatlar"]:checked')).map(cb => cb.value);
            const seciliReferanslar = Array.from(document.querySelectorAll('input[name="referanslar"]:checked')).map(cb => cb.value);

            if(seciliTalimatlar.length === 0 || seciliReferanslar.length === 0) {
                return alert("Lütfen en az bir talimat ve bir referans seçin!");
            }

            const payload = {
                metot_adi: document.getElementById("metot_adi").value,
                metot_kodu: document.getElementById("metot_kodu").value,
                talimatlar: seciliTalimatlar,
                referanslar: seciliReferanslar
            };

            const res = await fetch('/api/metotlar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if(res.ok) {
                document.getElementById("success-msg").style.display = "block";
                document.getElementById("metotForm").reset();
                setTimeout(() => document.getElementById("success-msg").style.display = "none", 3000);
            }
        };

        window.onload = baslat;
    </script>
</body>
</html>
