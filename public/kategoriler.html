<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabQMS Pro - Laboratuvar Yönetim Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #1E40AF; --sidebar-bg: #0f172a; --sidebar-hover: #1e293b; 
            --text-main: #334155; --border: #e2e8f0; --bg-main: #f1f5f9; 
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SABİT YAN MENÜ */
        .sidebar { 
            width: 260px; 
            min-width: 260px; 
            flex-shrink: 0;   
            background-color: var(--sidebar-bg); 
            color: #f8fafc; 
            display: flex; 
            flex-direction: column; 
            z-index: 1000;
        }
        .sidebar-header { padding: 25px; font-size: 1.4rem; font-weight: 700; border-bottom: 1px solid #1e293b; color: #fff; }
        .sidebar-menu { flex: 1; padding: 15px 0; overflow-y: auto; }
        .menu-item { 
            display: flex; align-items: center; padding: 12px 25px; color: #94a3b8; 
            text-decoration: none; transition: 0.2s; font-size: 0.95rem; font-weight: 500;
        }
        .menu-item:hover, .menu-item.active { background-color: var(--sidebar-hover); color: #fff; }
        .menu-item span { margin-right: 12px; font-size: 1.2rem; }

        /* ANA İÇERİK ALANI */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background-color: var(--bg-main); }
        .topbar { 
            height: 65px; background: #fff; border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: space-between; padding: 0 30px;
        }
        #ekran { flex: 1; border: none; width: 100%; height: 100%; background: var(--bg-main); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">LabQMS <span style="color: var(--primary);">PRO</span></div>
        <div class="sidebar-menu">
            <a href="dashboard.html" target="ekran" class="menu-item active" onclick="aktifYap(this)"><span>📊</span> Dashboard</a>
            <a href="musteriler.html" target="ekran" class="menu-item" onclick="aktifYap(this)"><span>🏢</span> Müşteriler (CRM)</a>
            <a href="kategoriler.html" target="ekran" class="menu-item" onclick="aktifYap(this)"><span>📁</span> Kategori Yönetimi</a>
            <a href="cihaz-kutuphanesi.html" target="ekran" class="menu-item" onclick="aktifYap(this)"><span>🗂️</span> Cihaz Kütüphanesi</a>
            <a href="kabul.html" target="ekran" class="menu-item" onclick="aktifYap(this)"><span>📥</span> Cihaz Kabul</a>
            <a href="operasyon.html" target="ekran" class="menu-item" onclick="aktifYap(this)"><span>🔄</span> Operasyon Merkezi</a>
            <a href="teklif.html" target="ekran" class="menu-item" onclick="aktifYap(this)"><span>📄</span> Teklif ve Fiyatlar</a>
            <a href="personel.html" target="ekran" class="menu-item" onclick="aktifYap(this)"><span>👤</span> Personel ve Yetkiler</a>
        </div>
    </aside>

    <div class="main-content">
        <header class="topbar">
            <div style="font-weight: 600; color: var(--primary);">Laboratuvar Yönetim Sistemi</div>
            <div style="font-weight: 600; font-size: 0.9rem;">👤 Yönetici Paneli</div>
        </header>

        <iframe name="ekran" id="ekran" src="dashboard.html">
            Tarayıcınız iframe desteklemiyor.
        </iframe>
    </div>

    <script>
        function aktifYap(element) {
            // Tüm menü elemanlarından active class'ını kaldır
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
            });
            // Tıklanan elemana active class'ını ekle
            element.classList.add('active');
        }
    </script>
</body>
</html>
