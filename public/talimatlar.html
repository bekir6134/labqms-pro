<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kalibrasyon Talimatları</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1E40AF; --border: #e2e8f0; --bg: #f8fafc; --success: #10B981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 20px; color: #334155; }
        .card { background: #fff; padding: 25px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Form ve Giriş Alanları */
        .input-group { display: grid; grid-template-columns: 2fr 1fr 1.5fr auto; gap: 10px; margin-bottom: 5px; background: #f1f5f9; padding: 15px; border-radius: 8px; }
        input { padding: 10px; border: 1px solid var(--border); border-radius: 6px; outline: none; font-family: inherit; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1); }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn:hover { background: #1e3a8a; transform: translateY(-1px); }
        
        /* Bildirim Mesajı */
        #success-msg { display: none; background: #dcfce7; color: #166534; padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: 600; border: 1px solid #bbf7d0; animation: fadeIn 0.3s; }

        /* Arama ve Tablo */
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .search-box { width: 300px; }
        .search-box input { width: 100%; padding-left: 35px; background: #fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%2364748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>') no-repeat 10px center; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 12px; text-align: left; color: #64748b; font-size: 0.85rem; border-bottom: 2px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
        .code-badge { background: #e0e7ff; color: #4338ca; padding: 4px 8px; border-radius: 4px; font-weight: 700; font-size: 0.8rem; font-family: monospace; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="success-msg">✅ Talimat başarıyla kaydedildi!</div>

    <div class="card">
        <h2 style="color: var(--primary); margin-top:0;">📜 Yeni Talimat Tanımla</h2>
        <div class="input-group">
            <input type="text" id="t_ad" placeholder="Talimat Adı (Örn: Dijital Kumpas Talimatı)">
            <input type="text" id="t_kod" placeholder="Kod (Örn: TL-01)">
            <input type="text" id="t_aralik" placeholder="Ölçme Aralığı (Örn: 0-300 mm)">
            <button class="btn" id="saveBtn" onclick="kaydet()">➕ Talimat Ekle</button>
        </div>
    </div>

    <div class="card">
        <div class="table-header">
            <h2 style="margin:0; color: var(--primary);">📚 Talimat Listesi</h2>
            <div class="search-box">
                <input type="text" id="talimatAra" onkeyup="tabloAra()" placeholder="Talimat adı veya kod ara...">
            </div>
        </div>

        <table id="talimatTablo">
            <thead>
                <tr>
                    <th>Kod</th>
                    <th>Talimat Adı</th>
                    <th>Ölçme Aralığı</th>
                    <th>Yayın Tarihi</th>
                </tr>
            </thead>
            <tbody id="talimatListesi">
                </tbody>
        </table>
    </div>

    <script>
        // 1. LİSTELEME
        async function listele() {
            try {
                const res = await fetch('/api/talimatlar');
                const data = await res.json();
                const tbody = document.getElementById("talimatListesi");
                tbody.innerHTML = data.map(t => `
                    <tr>
                        <td><span class="code-badge">${t.talimat_kodu}</span></td>
                        <td><strong>${t.talimat_adi}</strong></td>
                        <td>${t.olcme_araligi}</td>
                        <td>${new Date(t.yayin_tarihi).toLocaleDateString('tr-TR')}</td>
                    </tr>
                `).join('');
            } catch (err) { console.error("Hata:", err); }
        }

        // 2. KAYDETME
        async function kaydet() {
            const btn = document.getElementById("saveBtn");
            const successMsg = document.getElementById("success-msg");
            
            const payload = {
                talimat_adi: document.getElementById("t_ad").value,
                talimat_kodu: document.getElementById("t_kod").value,
                olcme_araligi: document.getElementById("t_aralik").value
            };
            
            if(!payload.talimat_adi || !payload.talimat_kodu) return alert("Ad ve Kod alanları zorunludur!");

            btn.disabled = true;
            btn.innerText = "Yükleniyor...";

            try {
                const res = await fetch('/api/talimatlar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    // Temizlik ve Bildirim
                    document.getElementById("t_ad").value = "";
                    document.getElementById("t_kod").value = "";
                    document.getElementById("t_aralik").value = "";
                    
                    successMsg.style.display = "block";
                    setTimeout(() => { successMsg.style.display = "none"; }, 3000);
                    
                    listele();
                }
            } catch (err) { console.error(err); } 
            finally {
                btn.disabled = false;
                btn.innerText = "➕ Talimat Ekle";
            }
        }

        // 3. ANLIK ARAMA
        function tabloAra() {
            const filter = document.getElementById("talimatAra").value.toUpperCase();
            const rows = document.getElementById("talimatListesi").getElementsByTagName("tr");

            for (let i = 0; i < rows.length; i++) {
                const txtKod = rows[i].cells[0].textContent || rows[i].cells[0].innerText;
                const txtAd = rows[i].cells[1].textContent || rows[i].cells[1].innerText;
                
                if (txtKod.toUpperCase().indexOf(filter) > -1 || txtAd.toUpperCase().indexOf(filter) > -1) {
                    rows[i].style.display = "";
                } else {
                    rows[i].style.display = "none";
                }
            }
        }

        window.onload = listele;
    </script>
</body>
</html>
