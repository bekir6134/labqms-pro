<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>LabQMS Pro - Teklif Hazırlama</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1E40AF; --border: #e2e8f0; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .card { background: #fff; padding: 25px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 8px; }
        input, select, datalist { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; outline: none; }
        .price-box { background: #f0fdf4; padding: 15px; border-radius: 8px; border: 1px solid #dcfce7; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border); color: #64748b; }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2 style="color: var(--primary); margin-top:0;">📄 Yeni Teklif Oluştur</h2>
        
        <div class="row">
            <div>
                <label>Firma Adı (Seçebilir veya Yazabilirsiniz)</label>
                <input list="musteriListesi" id="firma_adi" placeholder="Firma ara veya yaz...">
                <datalist id="musteriListesi"></datalist>
            </div>
            <div>
                <label>Teklif Tarihi</label>
                <input type="date" id="teklif_tarihi">
            </div>
        </div>

        <div class="row" style="grid-template-columns: 2fr 1fr 1fr;">
            <div>
                <label>Cihaz Tanımı (Kütüphaneden Çeker / El ile Yazılabilir)</label>
                <input list="cihazListesi" id="cihaz_adi" placeholder="Cihaz ara veya yaz..." oninput="fiyatGetir(this.value)">
                <datalist id="cihazListesi"></datalist>
            </div>
            <div class="price-box">
                <label>Birim Fiyat</label>
                <input type="number" id="birim_fiyat" placeholder="0.00">
            </div>
            <div>
                <label>Para Birimi</label>
                <select id="para_birimi">
                    <option value="₺">₺ TL</option>
                    <option value="$">$ USD</option>
                    <option value="€">€ EUR</option>
                </select>
            </div>
        </div>

        <button class="btn-add" onclick="teklifeEkle()">➕ Teklif Satırına Ekle</button>

        <table id="teklifTablo">
            <thead>
                <tr>
                    <th>Cihaz</th>
                    <th>Fiyat</th>
                    <th>İşlem</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    let cihazVerileri = [];

    // 1. Verileri Yükle
    async function verileriYukle() {
        const res = await fetch('/api/teklif-on-veriler');
        const data = await res.json();
        
        // Müşterileri Datalist'e doldur
        const mList = document.getElementById("musteriListesi");
        data.musteriler.forEach(m => {
            let opt = document.createElement("option");
            opt.value = m.row_firma_adi || m.firma_adi;
            mList.appendChild(opt);
        });

        // Cihazları Datalist'e doldur
        cihazVerileri = data.cihazlar;
        const cList = document.getElementById("cihazListesi");
        data.cihazlar.forEach(c => {
            let opt = document.createElement("option");
            opt.value = c.cihaz_adi;
            cList.appendChild(opt);
        });
        
        document.getElementById("teklif_tarihi").valueAsDate = new Date();
    }

    // 2. Cihaz seçilince fiyatı getir (Değiştirilebilir)
    function fiyatGetir(secilenAd) {
        const cihaz = cihazVerileri.find(c => c.cihaz_adi === secilenAd);
        if(cihaz) {
            document.getElementById("birim_fiyat").value = cihaz.fiyat;
            document.getElementById("para_birimi").value = cihaz.para_birimi;
        }
    }

    // 3. Geçici Listeye Ekle
    function teklifeEkle() {
        const ad = document.getElementById("cihaz_adi").value;
        const fiyat = document.getElementById("birim_fiyat").value;
        const pb = document.getElementById("para_birimi").value;

        if(!ad || !fiyat) return alert("Cihaz ve fiyat girmelisiniz!");

        const tbody = document.querySelector("#teklifTablo tbody");
        tbody.innerHTML += `
            <tr>
                <td>${ad}</td>
                <td><b>${fiyat} ${pb}</b></td>
                <td><button onclick="this.parentElement.parentElement.remove()" style="color:red; border:none; background:none; cursor:pointer;">❌</button></td>
            </tr>`;
        
        // Alanları temizle
        document.getElementById("cihaz_adi").value = "";
        document.getElementById("birim_fiyat").value = "";
    }

    window.onload = verileriYukle;
</script>
</body>
</html>
