<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Laboratuvar Operasyon Merkezi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#1E40AF; --sidebar:#1e293b; --border:#e2e8f0; --bg:#f8fafc; --success:#10B981; --warning:#f59e0b; }
        body { font-family:'Inter',sans-serif; background:var(--bg); margin:0; display:flex; color:#334155; }
        
        .sidebar { width:250px; background:var(--sidebar); color:white; height:100vh; position:fixed; padding:20px; box-sizing:border-box; }
        .nav-link { display:block; color:#cbd5e1; text-decoration:none; padding:12px; border-radius:8px; margin-bottom:5px; transition:0.3s; font-size:0.9rem; }
        .nav-link:hover, .nav-link.active { background:#334155; color:white; }

        .main-content { margin-left:250px; flex:1; padding:30px; }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        h2 { margin:0; color:var(--primary); }

        /* FİLTRE BAR TASARIMI */
        .filter-bar { display:flex; gap:10px; margin-bottom:20px; overflow-x:auto; padding-bottom:5px; }
        .filter-btn { padding:8px 16px; border:1px solid var(--border); background:#fff; border-radius:20px; cursor:pointer; font-size:0.85rem; font-weight:600; color:#64748b; transition:0.2s; white-space:nowrap; }
        .filter-btn:hover { border-color:#cbd5e1; background:#f1f5f9; }
        .filter-btn.active { background:var(--primary); color:white; border-color:var(--primary); }

        .card { background:#fff; padding:20px; border-radius:12px; border:1px solid var(--border); box-shadow:0 4px 6px rgba(0,0,0,0.05); }
        
        table { width:100%; border-collapse:collapse; }
        th { background:#f8fafc; text-align:left; padding:12px; border-bottom:2px solid var(--border); color:#64748b; font-size:0.85rem; }
        td { padding:12px; border-bottom:1px solid var(--border); font-size:0.9rem; vertical-align:middle; }
        
        /* AŞAMA RENKLERİ (Senin İstediğin İsimlere Göre) */
        .badge { padding:5px 12px; border-radius:12px; font-size:0.75rem; font-weight:700; }
        .b-kabul { background:#f1f5f9; color:#475569; } /* Kabul Edildi */
        .b-hazirlaniyor { background:#fef9c3; color:#854d0e; } /* Hazırlanıyor */
        .b-tamamlandi { background:#dbeafe; color:#1e40af; } /* Tamamlandı */
        .b-imzalandi { background:#ede9fe; color:#6d28d9; } /* İmzalandı */
        .b-onaylandi { background:#d1fae5; color:#065f46; } /* Onaylandı */
        .b-sertifika { background:#dcfce7; color:#166534; } /* Sertifika Gönderildi */

        .btn-islem { background:#f8fafc; color:var(--primary); border:1px solid #bfdbfe; padding:8px 14px; border-radius:6px; cursor:pointer; font-weight:600; font-size:0.8rem; transition:0.2s; }
        .btn-islem:hover { background:var(--primary); color:white; }

        /* MODAL TASARIMI */
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; }
        .modal { background:#fff; width:500px; border-radius:12px; padding:25px; box-shadow:0 10px 25px rgba(0,0,0,0.2); }
        .modal-header { font-size:1.2rem; font-weight:700; color:var(--primary); margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:10px; }
        .form-group { margin-bottom:15px; }
        label { display:block; font-size:0.85rem; font-weight:600; color:#64748b; margin-bottom:5px; }
        input, select { width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; box-sizing:border-box; font-family:inherit; }
        
        .btn-group { display:flex; gap:10px; margin-top:20px; }
        .btn-save { flex:1; background:var(--success); color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer; }
        .btn-cancel { flex:1; background:#f1f5f9; color:#475569; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer; }
        
        .cihaz-info { background:#f8fafc; padding:10px; border-radius:8px; margin-bottom:15px; font-size:0.85rem; border:1px dashed #cbd5e1; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color: white; text-align: center; margin-bottom: 30px;">LabQMS Pro</h2>
        <nav>
            <a href="dashboard.html" class="nav-link">🏠 Dashboard</a>
            <a href="kabul.html" class="nav-link">📥 Cihaz Kabul</a>
            <a href="operasyon.html" class="nav-link active">🔬 Operasyon</a>
            <a href="metotlar.html" class="nav-link">🧪 Metotlar</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="header">
            <h2>🔬 Laboratuvar İş Listesi</h2>
        </div>

        <div class="filter-bar" id="filtreBar">
            <button class="filter-btn active" onclick="filtrele('Tümü')">Tümü</button>
            <button class="filter-btn" onclick="filtrele('Kabul Edildi')">📥 Kabul Edildi</button>
            <button class="filter-btn" onclick="filtrele('Hazırlanıyor')">⚙️ Hazırlanıyor</button>
            <button class="filter-btn" onclick="filtrele('Tamamlandı')">✅ Tamamlandı</button>
            <button class="filter-btn" onclick="filtrele('İmzalandı')">✍️ İmzalandı</button>
            <button class="filter-btn" onclick="filtrele('Onaylandı')">🏅 Onaylandı</button>
            <button class="filter-btn" onclick="filtrele('Sertifika Gönderildi')">📧 Sertifika Gönderildi</button>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>İş Emri</th>
                        <th>Firma Adı</th>
                        <th>Cihaz Bilgisi</th>
                        <th>S/N</th>
                        <th>Aşama</th>
                        <th>İşlem</th>
                    </tr>
                </thead>
                <tbody id="cihazListesi">
                    <tr><td colspan="6" style="text-align:center;">Veriler yükleniyor...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="islemModal">
        <div class="modal">
            <div class="modal-header">⚙️ Kalibrasyon Veri Girişi</div>
            
            <div class="cihaz-info" id="modalCihazInfo"></div>

            <input type="hidden" id="is_emri_id">
            <input type="hidden" id="cihaz_index">

            <div class="form-group">
                <label>İşlemi Yapan Personel</label>
                <input type="text" id="personel" placeholder="Ad Soyad giriniz..." required>
            </div>

            <div class="form-group">
                <label>Kullanılacak Kalibrasyon Metodu</label>
                <select id="metot_id" required>
                    <option value="">Seçiniz...</option>
                </select>
            </div>

            <div style="display:flex; gap:10px;">
                <div class="form-group" style="flex:1;">
                    <label>Sıcaklık (°C)</label>
                    <input type="number" step="0.1" id="sicaklik" placeholder="Örn: 22.5" required>
                </div>
                <div class="form-group" style="flex:1;">
                    <label>Nem (%RH)</label>
                    <input type="number" step="1" id="nem" placeholder="Örn: 45" required>
                </div>
            </div>

            <div class="form-group" style="margin-top:10px;">
                <label style="color:var(--primary);">Cihazın Yeni Aşaması (Sonraki Adım)</label>
                <select id="sertifika_asamasi" required style="border-color:var(--primary); background:#eff6ff; font-weight:600;">
                    <option value="Kabul Edildi">📥 Kabul Edildi</option>
                    <option value="Hazırlanıyor">⚙️ Hazırlanıyor</option>
                    <option value="Tamamlandı">✅ Tamamlandı</option>
                    <option value="İmzalandı">✍️ İmzalandı</option>
                    <option value="Onaylandı">🏅 Onaylandı</option>
                    <option value="Sertifika Gönderildi">📧 Sertifika Mail Gönderildi</option>
                </select>
            </div>

            <div class="btn-group">
                <button class="btn-cancel" onclick="modalKapat()">İptal</button>
                <button class="btn-save" onclick="islemKaydet()">💾 Kaydet ve Aşamayı Güncelle</button>
            </div>
        </div>
    </div>

    <script>
        let metotlar = [];
        let tumCihazlar = []; // Filtreleme için tüm cihazları hafızada tutacağız

        async function sayfaYukle() {
            await metotlariCek();
            await cihazlariListele();
        }

        async function metotlariCek() {
            try {
                const res = await fetch('/api/metotlar');
                metotlar = await res.json();
                const select = document.getElementById("metot_id");
                metotlar.forEach(m => {
                    select.innerHTML += `<option value="${m.id}">${m.metot_kodu} - ${m.metot_adi}</option>`;
                });
            } catch(e) { console.error("Metotlar çekilemedi."); }
        }

        async function cihazlariListele() {
            try {
                const res = await fetch('/api/is-emirleri');
                const isEmirleri = await res.json();
                
                tumCihazlar = []; // Diziyi sıfırla
                
                // İş emirlerindeki cihazları düz bir listeye çevir
                isEmirleri.forEach(ie => {
                    const cihazlar = typeof ie.cihazlar === 'string' ? JSON.parse(ie.cihazlar) : ie.cihazlar;
                    if(cihazlar && cihazlar.length > 0) {
                        cihazlar.forEach((c, index) => {
                            tumCihazlar.push({
                                ie_id: ie.id,
                                ie_no: ie.ie_no,
                                firma_adi: ie.firma_adi,
                                index: index,
                                ...c
                            });
                        });
                    }
                });

                tabloyaCiz(tumCihazlar);

            } catch (err) { console.error("Hata:", err); }
        }

        // Filtreleme Fonksiyonu
        function filtrele(asama) {
            // Buton aktiflik durumunu ayarla
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (asama === 'Tümü') {
                tabloyaCiz(tumCihazlar);
            } else {
                const filtrelenmis = tumCihazlar.filter(c => (c.islem_durumu || 'Kabul Edildi') === asama || (c.islem_durumu === 'Sertifika Mail Gönderildi' && asama === 'Sertifika Gönderildi'));
                tabloyaCiz(filtrelenmis);
            }
        }

        function tabloyaCiz(liste) {
            const tbody = document.getElementById("cihazListesi");
            tbody.innerHTML = "";

            if(liste.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:30px; color:#94a3b8;">Bu aşamada bekleyen cihaz bulunmuyor.</td></tr>`;
                return;
            }

            liste.forEach(c => {
                const durum = c.islem_durumu || "Kabul Edildi";
                let badgeClass = "b-kabul";
                
                if(durum === "Hazırlanıyor") badgeClass = "b-hazirlaniyor";
                else if(durum === "Tamamlandı") badgeClass = "b-tamamlandi";
                else if(durum === "İmzalandı") badgeClass = "b-imzalandi";
                else if(durum === "Onaylandı") badgeClass = "b-onaylandi";
                else if(durum.includes("Sertifika")) badgeClass = "b-sertifika";

                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td><b style="color:var(--primary)">${c.ie_no}</b></td>
                    <td>${c.firma_adi}</td>
                    <td><b>${c.cihaz_adi}</b><br><small style="color:#64748b">${c.marka_model || '-'}</small></td>
                    <td>${c.seri_no || '-'}</td>
                    <td><span class="badge ${badgeClass}">${durum}</span></td>
                    <td>
                        <button class="btn-islem" onclick='modalAc(${c.ie_id}, ${c.index}, ${JSON.stringify(c).replace(/'/g, "&apos;")})'>
                            ⚙️ İşlem / Aşama
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function modalAc(ie_id, index, cihaz) {
            document.getElementById("is_emri_id").value = ie_id;
            document.getElementById("cihaz_index").value = index;
            
            document.getElementById("modalCihazInfo").innerHTML = `
                <b>Cihaz:</b> ${cihaz.cihaz_adi} (${cihaz.marka_model || 'Markasız'}) <br>
                <b>Seri No:</b> ${cihaz.seri_no || '-'} <br>
                <b>Mevcut Aşama:</b> <span style="color:var(--primary); font-weight:bold;">${cihaz.islem_durumu || 'Kabul Edildi'}</span>
            `;

            if(cihaz.kalibrasyon_verileri) {
                document.getElementById("personel").value = cihaz.kalibrasyon_verileri.personel || '';
                document.getElementById("metot_id").value = cihaz.kalibrasyon_verileri.metot_id || '';
                document.getElementById("sicaklik").value = cihaz.kalibrasyon_verileri.sicaklik || '';
                document.getElementById("nem").value = cihaz.kalibrasyon_verileri.nem || '';
            } else {
                document.getElementById("personel").value = ''; document.getElementById("metot_id").value = '';
                document.getElementById("sicaklik").value = ''; document.getElementById("nem").value = '';
            }

            document.getElementById("sertifika_asamasi").value = cihaz.islem_durumu || "Kabul Edildi";
            document.getElementById("islemModal").style.display = "flex";
        }

        function modalKapat() { document.getElementById("islemModal").style.display = "none"; }

        async function islemKaydet() {
            const ie_id = document.getElementById("is_emri_id").value;
            const payload = {
                cihaz_index: document.getElementById("cihaz_index").value,
                personel: document.getElementById("personel").value,
                metot_id: document.getElementById("metot_id").value,
                sicaklik: document.getElementById("sicaklik").value,
                nem: document.getElementById("nem").value,
                sertifika_asamasi: document.getElementById("sertifika_asamasi").value
            };

            // Eğer aşama sadece değişiyorsa ama veri girilmediyse uyarı ver
            if(payload.sertifika_asamasi !== "Kabul Edildi" && (!payload.personel || !payload.metot_id)) {
                return alert("Aşama değiştirmek için Personel, Metot ve Çevre Şartlarını doldurmalısınız!");
            }

            try {
                const res = await fetch(`/api/is-emirleri/${ie_id}/cihaz-islem`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    modalKapat();
                    // "Tümü" filtresine dön ve listeyi yenile
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    document.querySelector('.filter-btn').classList.add('active');
                    cihazlariListele(); 
                } else { alert("Kaydedilirken bir hata oluştu."); }
            } catch(e) { console.error(e); }
        }

        window.onload = sayfaYukle;
    </script>
</body>
</html>
