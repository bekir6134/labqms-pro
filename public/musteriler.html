<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabQMS Pro - Müşteriler (CRM)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1E40AF; --text-main: #334155; --text-muted: #64748b; --border: #e2e8f0; --bg-main: #f8fafc; --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); --success: #10B981; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .module-container { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 20px; }
        .card { background-color: #fff; padding: 25px; border-radius: 12px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .full-width { grid-column: 1 / -1; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-size: 0.95rem; font-family: 'Inter', sans-serif; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1); }
        .btn-save { background-color: var(--primary); color: #fff; padding: 12px 20px; font-size: 1rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 15px; transition: 0.2s; }
        .btn-save:hover { background-color: #1e3a8a; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th { background-color: #f1f5f9; padding: 12px; text-align: left; border-bottom: 1px solid var(--border); color: var(--text-muted); }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        .search-bar { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; margin-bottom: 15px; box-sizing: border-box; background-color: #f8fafc; }
        .badge { background-color: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="module-container">
    
    <div class="card">
        <h2 style="margin-top: 0; color: var(--primary);">🏢 Yeni Müşteri (Cari) Kartı Oluştur</h2>
        <form id="musteriForm" onsubmit="musteriKaydet(event)">
            <div class="form-grid">
                <div class="full-width">
                    <label>Firma Resmi Ünvanı *</label>
                    <input type="text" id="firma_adi" placeholder="Örn: XYZ Makine Sanayi ve Ticaret A.Ş." required>
                </div>
                <div>
                    <label>Yetkili Kişi</label>
                    <input type="text" id="yetkili_kisi" placeholder="Örn: Ahmet Yılmaz">
                </div>
                <div>
                    <label>Telefon Numarası</label>
                    <input type="text" id="telefon" placeholder="05XX XXX XX XX">
                </div>
                <div>
                    <label>E-Posta Adresi</label>
                    <input type="email" id="email" placeholder="kalite@xyzmakine.com">
                </div>
                <div class="full-width">
                    <label>Firma Adresi</label>
                    <textarea id="adres" rows="2" placeholder="Örn: Organize Sanayi Bölgesi 2. Cadde No:5"></textarea>
                </div>
            </div>
            <button type="submit" class="btn-save" id="kaydetBtn">+ Müşteriyi Kaydet</button>
        </form>
    </div>

    <div class="card">
        <h2 style="margin-top: 0; color: var(--primary);">📋 Kayıtlı Müşteriler Listesi</h2>
        <input type="text" id="aramaKutusu" class="search-bar" placeholder="🔍 Firma Adı, Yetkili veya Telefon ara..." onkeyup="musteriAra()">
        
        <div style="overflow-x: auto;">
            <table id="musteriTablosu">
                <thead>
                    <tr>
                        <th>Firma Ünvanı</th>
                        <th>Yetkili Kişi</th>
                        <th>Telefon</th>
                        <th>E-Posta</th>
                        <th>Durum</th>
                    </tr>
                </thead>
                <tbody id="musteriListesiGövdesi">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 1. SAYFA AÇILDIĞINDA MÜŞTERİLERİ VERİTABANINDAN ÇEK (GET)
    async function musterileriYukle() {
        const tbody = document.getElementById('musteriListesiGövdesi');
        tbody.innerHTML = '<tr><td colspan="5">Yükleniyor...</td></tr>';
        
        try {
            const response = await fetch('/api/musteriler'); // Server.js'deki rotaya gidiyor
            if (!response.ok) throw new Error('Veriler alınamadı');
            
            const musteriler = await response.json();
            tbody.innerHTML = ''; // Yükleniyor yazısını temizle
            
            if(musteriler.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">Henüz kayıtlı müşteri bulunmuyor.</td></tr>';
                return;
            }

            // Gelen her bir müşteri için tabloya yeni bir satır ekle
            musteriler.forEach(m => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight: 600;">${m.firma_adi}</td>
                    <td>${m.yetkili_kisi || '-'}</td>
                    <td>${m.telefon || '-'}</td>
                    <td>${m.email || '-'}</td>
                    <td><span class="badge">Aktif</span></td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            console.error(error);
            tbody.innerHTML = '<tr><td colspan="5" style="color:red;">Veriler yüklenirken bir hata oluştu.</td></tr>';
        }
    }

    // 2. YENİ MÜŞTERİYİ VERİTABANINA KAYDET (POST)
    async function musteriKaydet(event) {
        event.preventDefault(); // Sayfanın yenilenmesini engelle
        const btn = document.getElementById('kaydetBtn');
        btn.innerText = "Kaydediliyor...";
        btn.disabled = true;

        const yeniMusteri = {
            firma_adi: document.getElementById('firma_adi').value,
            yetkili_kisi: document.getElementById('yetkili_kisi').value,
            telefon: document.getElementById('telefon').value,
            email: document.getElementById('email').value,
            adres: document.getElementById('adres').value
        };

        try {
            const response = await fetch('/api/musteriler', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(yeniMusteri)
            });

            if (response.ok) {
                alert("✅ Müşteri başarıyla kaydedildi!");
                document.getElementById('musteriForm').reset(); // Formu temizle
                musterileriYukle(); // Tabloyu anında güncelle
            } else {
                alert("❌ Kayıt sırasında bir hata oluştu.");
            }
        } catch (error) {
            console.error(error);
            alert("Sunucuya ulaşılamıyor.");
        } finally {
            btn.innerText = "+ Müşteriyi Kaydet";
            btn.disabled = false;
        }
    }

    // 3. TABLODA ARAMA YAPMA İŞLEMİ
    function musteriAra() {
        let input = document.getElementById("aramaKutusu").value.toLowerCase();
        let rows = document.querySelectorAll("#musteriListesiGövdesi tr");
        rows.forEach(row => {
            let text = row.innerText.toLowerCase();
            row.style.display = text.includes(input) ? "" : "none";
        });
    }

    // Sayfa açılır açılmaz listeyi yükle
    window.onload = musterileriYukle;
</script>

</body>
</html>
