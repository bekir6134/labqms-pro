<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Cihaz Kabul</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #334155; padding: 20px; }
        .card { background: #fff; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: 1 / -1; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .btn { background: #1E40AF; color: #fff; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th { background: #f1f5f9; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        
        /* Modal Style */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 25px; border-radius: 12px; width: 500px; }
    </style>
</head>
<body>
    <div style="max-width: 1000px; margin: 0 auto;">
        <div style="margin-bottom: 15px;"><a href="index.html" style="text-decoration:none; color:#1E40AF; font-weight:bold;">⬅️ Ana Panele Dön</a></div>
        
        <div class="card">
            <h2>📥 Cihaz Kabul ve İş Emri</h2>
            <div class="form-grid">
                <div><label>Kabul Tarihi</label><input type="date" id="tarih"></div>
                <div class="full"><label>🏢 Fatura Edilecek Firma</label><input type="text" placeholder="Firma seç..."></div>
            </div>
        </div>

        <div class="card" id="sertCard">
            <h2>📜 Sertifika Sahibi (Asıl Kullanıcı)</h2>
            <label style="display:flex; gap:10px; cursor:pointer;"><input type="checkbox" id="ayniFirma" checked onchange="toggleFirma()"> Sertifika bilgileri fatura firması ile aynı.</label>
            <div id="sertFirmaAlan" style="display:none; margin-top:15px;">
                <input type="text" placeholder="Asıl kullanıcı firmayı seç...">
            </div>
        </div>

        <div class="card">
            <h2>📦 Gelen Cihazlar</h2>
            <table>
                <tr>
                    <th style="width: 40%;">Müşteri Cihazını Seç</th>
                    <th style="width: 20%;">Seri No</th>
                    <th>Fiziksel Durum</th>
                </tr>
                <tbody id="tbody">
                    <tr>
                        <td style="display:flex; gap:5px;">
                            <select onchange="this.parentElement.nextElementSibling.querySelector('input').value = this.value">
                                <option value="">-- Seç --</option>
                                <option value="SN-123">Mikrometre - Mitutoyo</option>
                            </select>
                            <button onclick="document.getElementById('modal').style.display='flex'" style="background:#eff6ff; border:1px solid #bfdbfe; border-radius:4px; cursor:pointer;">+</button>
                        </td>
                        <td><input type="text" readonly style="background:#f8fafc;"></td>
                        <td><select><option>Sağlam</option><option>Çizik</option></select></td>
                    </tr>
                </tbody>
            </table>
            <button class="btn" style="background:#f0fdf4; color:#166534; border:1px dashed #4ade80;">+ Yeni Satır Ekle</button>
            <button class="btn">💾 Cihazları Kabul Et</button>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 style="margin-top:0;">Müşteriye Yeni Cihaz Ekle</h3>
            <div class="form-grid">
                <div class="full"><label>Cihaz Adı</label><input type="text"></div>
                <div><label>Marka</label><input type="text"></div>
                <div><label>Seri No</label><input type="text"></div>
                <div class="full"><button class="btn" onclick="document.getElementById('modal').style.display='none'; alert('Eklendi!');">Kaydet ve Seç</button></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('tarih').valueAsDate = new Date();
        function toggleFirma() {
            document.getElementById('sertFirmaAlan').style.display = document.getElementById('ayniFirma').checked ? 'none' : 'block';
        }
    </script>
</body>
</html>
